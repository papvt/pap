<section class="section" id="contact">
  <h2>Contact OBX</h2>

  <form class="contact-form" id="contact-form" action="https://formspree.io/f/xgopdgrw" method="POST">
    <input type="text" name="name" placeholder="Your Name" required>
    <input type="email" name="email" placeholder="Your Email" required>
    <textarea name="message" rows="5" placeholder="Your Message" required></textarea>
    <button class="button" type="submit">Send Message</button>
  </form>

  <p id="form-status" style="text-align:center; margin-top:15px;"></p>
</section>

<script>
  const form = document.getElementById("contact-form");
  const status = document.getElementById("form-status");

  form.addEventListener("submit", async function(e) {
    e.preventDefault();

    const data = new FormData(form);

    try {
      const response = await fetch(form.action, {
        method: form.method,
        body: data,
        headers: {
          Accept: "application/json"
        }
      });

      if (response.ok) {
        status.textContent = "Thanks! Your message was sent successfully.";
        form.reset();
      } else {
        status.textContent = "Oops! Something went wrong. Please try again.";
      }
    } catch (error) {
      status.textContent = "Oops! There was a problem submitting your form.";
    }
  });
</script>
